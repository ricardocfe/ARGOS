<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador CFE - GESCOM</title>
    <style>
    <link rel="stylesheet" href="css/styles.css">
<body>

    <header>
        <h1>Simulador Integral</h1>
        <h2>CFE - SUTERM SECCIÓN 72</h2>
        <div class="zona-label">Zona Los Mochis - Div. Noroeste</div>
        <div class="creator-label">Creado por Ricardo Castro</div>
    </header>

    <div id="loginScreen" class="screen">
        <div class="login-card">
            <label class="login-label">NOMBRE DEL ELEMENTO:</label>
            <input type="text" id="inputName" class="login-input" placeholder="Nombre completo">

            <label class="login-label">RPE:</label>
            <input type="text" id="inputRPE" class="login-input" placeholder="Ej: A12345">

            <div style="background: #f1f8e9; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align:left; border: 1px solid #c8e6c9;">
                <label class="login-label" style="text-align:center;">🛠️ MÓDULO DE ENTRENAMIENTO</label>
                <select id="moduleSelect" class="login-select">
                    <option value="classic">Lectura Clásica (Electromecánicos)</option>
                    <option value="auditor">Modo Auditor (Acomodar Agujas)</option>
                    <option value="digital">Digitales Inteligentes (LCD)</option>
                    <option value="impediment">Claves de Observación (Impedimentos)</option>
                    <option value="theory" style="font-weight:bold;">📚 Examen Teórico (Capítulo 100)</option>
                    <option value="random">🔥 Aleatorio Extremo (Todos)</option>
                </select>

                <label style="font-size: 12px; color: #555; display: flex; align-items: center; gap: 8px; margin-bottom:8px;">
                    <input type="checkbox" id="fieldModeCheck"> Simular Cristal Sucio
                </label>
                <label style="font-size: 12px; color: #555; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="rutaCheck"> <b>Modo Ruta de Campo (7s por lectura)</b>
                </label>
            </div>

            <button class="btn-blue" onclick="startTest(true)">▶ PRÁCTICA LIBRE (SIN LÍMITE)</button>
            <button class="btn-green" style="margin-top: 10px;" onclick="startTest(false)">📝 EVALUACIÓN OFICIAL (10 PREGUNTAS)</button>
        </div>
    </div>

    <div id="checklistScreen" class="screen hidden">
        <div class="login-card" style="text-align: left;">
            <h3 style="color:#2e7d32; margin-top: 0; text-align: center;">📋 CHECK-LIST PRE-RUTA</h3>
            <p style="font-size:13px; color:#555; margin-bottom: 15px; text-align: justify;">Verifica tu preparación operativa antes de iniciar la ruta de trabajo:</p>
            
            <div class="chk-item"><input type="checkbox" id="chk1"><label for="chk1">Realizar la Reunión de Inicio de Maniobra (RIM) / RIJ del día.</label></div>
            <div class="chk-item"><input type="checkbox" id="chk2"><label for="chk2">Llenado del formato RIM (Evaluación de riesgos 6 A's).</label></div>
            <div class="chk-item"><input type="checkbox" id="chk3"><label for="chk3">Firmar el formato de actividades.</label></div>
            <div class="chk-item"><input type="checkbox" id="chk4"><label for="chk4">Verificar hora y fecha de Terminal Portátil (TP).</label></div>
            <div class="chk-item"><input type="checkbox" id="chk5"><label for="chk5">Verificar el correcto funcionamiento del puerto óptico.</label></div>
            <div class="chk-item"><input type="checkbox" id="chk6"><label for="chk6">Revisar condiciones y limpieza del vehículo oficial.</label></div>
            <div class="chk-item"><input type="checkbox" id="chk7"><label for="chk7">Portar mi EPP Completo (Casco clase E, gafas, botas, ropa fajada sin metales).</label></div>
            
            <button id="btnStartRoute" class="btn-green" style="margin-top:20px; opacity:0.5;" disabled onclick="startRoute()">🚗 INICIAR RUTA EN CAMPO</button>
        </div>
    </div>

    <div id="gameScreen" class="screen hidden">
        <div class="info-bar">
            <span>Medidor/Preg: <span id="qCountText">1</span></span>
            <div id="qTimerDisplay" class="q-timer hidden">⏳ <span id="qTimerText">7s</span></div>
            <button class="btn-stop" onclick="finishTest()">🛑 TERMINAR</button>
        </div>

        <div id="mod-electromecanico" class="module-container hidden">
            <div id="auditorTarget" class="aud-target hidden"></div>
            <div class="meter-container" id="meterDisplay"></div>
            <div id="auditorControls" class="auditor-controls hidden"></div>
        </div>

        <div id="mod-digital" class="module-container hidden">
            <div class="digital-screen" id="digitalScreenContainer">
                <div id="digital-text" class="lcd-text">888888</div>
            </div>
        </div>

        <div id="mod-impedimento" class="module-container hidden">
            <div class="imp-box">
                <div id="impText" class="imp-text">"Texto del escenario..."</div>
                <div class="imp-grid">
                    <button class="btn-imp" onclick="checkImpediment('perro')">🐕<br>Perro Bravo</button>
                    <button class="btn-imp" onclick="checkImpediment('cerrado')">🔒<br>Casa Cerrada</button>
                    <button class="btn-imp" onclick="checkImpediment('opaco')">🌫️<br>Ilegible / Opaco</button>
                    <button class="btn-imp" onclick="checkImpediment('retirado')">❌<br>Medidor Retirado</button>
                </div>
            </div>
        </div>

        <div id="mod-theory" class="module-container hidden">
            <div class="imp-box" style="background:#e3f2fd; border:2px solid #0288d1;">
                <div style="font-size:24px; margin-bottom:5px;">📖</div>
                <div id="theoryQuestionText" class="imp-text" style="color:#01579b; font-size:15px;">¿Pregunta Teórica?</div>
                <div id="theoryOptionsContainer" style="display:flex; flex-direction:column; width:100%;">
                    </div>
            </div>
        </div>

        <div class="controls" id="generalControls">
            <input type="tel" id="userReading" class="main-input" placeholder="00000" maxlength="5">
            <button id="btnAction" class="btn-green" onclick="checkAnswer()">CONFIRMAR LECTURA</button>
            <button id="btnAnomaly" class="btn-red" onclick="reportAnomaly()">🚩 REPORTAR ANOMALÍA</button>
        </div>

        <div id="inlineFeedback" class="inline-feedback hidden">
            <div id="feedIcon" class="icon-feed"></div>
            <div id="feedText" class="text-feed"></div>
            <div id="feedSub" style="font-size:14px; color:#555; margin-bottom: 10px;"></div>
            <div id="feedExplanation" style="font-size:13px; color:#444; background:#f0f0f0; padding:12px; border-radius:8px; border-left:4px solid #c62828; text-align:left; width:100%; display:none;"></div>
            <button class="btn-blue" style="margin-top:15px;" onclick="nextQuestion()">Siguiente Acción</button>
        </div>
    </div>

    <div id="transitOverlay" class="transit-overlay">
        <div class="transit-card">
            <div style="font-size: 40px; margin-bottom: 5px;">🚐</div>
            <div class="text-feed transit-feed">EVENTO EN RUTA</div>
            <div id="transitSituation" style="font-size:14px; color:#333; margin: 15px 0; font-weight:bold; text-align:justify;"></div>
            <div id="transitOptions" style="display:flex; flex-direction:column; width:100%; gap:5px;"></div>
        </div>
    </div>

    <div id="resultScreen" class="screen hidden">
        <div class="result-card">
            <div style="color:#666; font-size:12px;">RESULTADO DE SESIÓN</div>
            <div class="score-big" id="finalScore">0%</div>

            <div class="user-info">
                <div class="info-row"><span>Personal:</span> <strong id="resName">-</strong></div>
                <div class="info-row"><span>RPE:</span> <strong id="resRPE">-</strong></div>
                <div class="info-row"><span>Ejercicios:</span> <strong id="resTotal">-</strong></div>
                <div class="info-row"><span>Correctos:</span> <strong id="resCorrect">-</strong></div>
                <div class="info-row"><span>Modalidad:</span> <strong id="resMod">-</strong></div>
            </div>

            <button class="btn-green" onclick="location.reload()">VOLVER AL INICIO</button>
        </div>
    </div>

    <script src="js/bancoPreguntas.js"></script>
    <script src="js/simulador.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
